# Hyprland Autostart

# Critical DBus/Environment setup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Core Components
exec-once = waybar
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hypridle

# Background management (using swaybg)
exec-once = swaybg -i ~/.config/barchyreborn/current/background -m fill

# Setup Walker / Elephant
exec-once = elephant --gapplication-service
exec-once = walker --gapplication-service

# The First-Run Wizard
exec-once = barchyreborn-welcome
