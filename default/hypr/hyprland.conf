# Barchyreborn main config file
source = ~/.config/barchyreborn/env

general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2
  col.active_border = rgb(7aa2f7)
  col.inactive_border = rgb(32344a)

  layout = dwindle
  resize_on_border = true
}

input {
  kb_layout =
  follow_mouse = 1
}

decoration {
  rounding = 8

  active_opacity = 1.0
  inactive_opacity = 1.0

  fullscreen_opacity = 1

  drop_shadow = true
  shadow_range = 20
  shadow_render_power = 3
  col.shadow = rgba(1a1b26aa)

  blur {
    enabled = true
    size = 5
    passes = 3
    new_optimizations = true
    xray = false
  }
}

animations {
  enabled = true
  bezier = smoothOut, 0.35, 0, 1, 1
  bezier = smoothIn, 0, 0, 0.3, 1

  animation = windowsOut, 1, 7, smoothOut, slide
  animation = windowsIn, 1, 7, smoothIn, slide
  animation = windowsMove, 1, 5, default
  animation = border, 1, 10, default
  animation = fade, 1, 7, smoothIn
  animation = fade, 1, 7, smoothOut
}

dwindle {
  pseudotile = always
  preserve_split = true
}

master {
  new_on_top = false
}

gestures {
  workspace_swipe = true
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  key_press_enables_dpms = true
}

$mainMod = SUPER

bind = $mainMod, Return, exec, alacritty
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, E, exec, nautilus
bind = $mainMod, V, togglefloating
bind = $mainMod, F, fullscreen

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, mouse:275, workspace, e+1
bind = $mainMod, mouse:276, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, Space, exec, wofi --show drun
bind = $mainMod SHIFT, Space, exec, wofi --show run

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

exec-once = dbus-update-activation-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = mako
exec-once = swaybg -i ~/.config/barchyreborn/current/background -m fill
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = bluetui &