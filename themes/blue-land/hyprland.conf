general {
    col.active_border = 0xff89b4f8
#    border_size = 2
    gaps_in = 3
#    gaps_out = 4
}

animations {
    enabled = yes

    bezier = calm, 0.25, 0.9, 0.35, 1

    animation = windows,     1, 4, calm
    animation = windowsIn,   1, 4, calm
    animation = windowsOut,  1, 3, calm
    animation = windowsMove, 1, 4, calm

    animation = fade,        1, 3, calm
    animation = fadeIn,      1, 3, calm
    animation = fadeOut,     1, 2, calm

    animation = layers,      1, 3, calm
    animation = layersIn,    1, 3, calm
    animation = layersOut,   1, 2, calm

    animation = workspaces,  1, 4, calm
}

decoration {
    rounding = 14
    shadow {
        enabled = false
        range = 15
        render_power = 5
        offset = 0 0
    }

    blur {
        enabled = true
        size = 1
        passes = 4
        contrast = 1.1
        brightness = 1.1
        vibrancy = 0.2
        vibrancy_darkness = 0.2
        noise = 0.03
        ignore_opacity = true
        new_optimizations = on
    }

    active_opacity = 0.93
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0
}

group {
    col.border_active = 0xff89b4f8
    col.border_inactive = 0xff444b6a
    col.border_locked_active = 0xff89b4f8
    col.border_locked_inactive = 0xff444b6a
}
